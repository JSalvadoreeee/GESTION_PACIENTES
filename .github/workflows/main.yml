name: Pipeline CI/CD - Gestión de Pacientes
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Compilar y Publicar en GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos de ejecución al Maven Wrapper
        working-directory: gestion_pacientes
        run: chmod +x mvnw

      - name: Compilar, testear y empaquetar con Maven
        working-directory: gestion_pacientes
        run: |
          ./mvnw clean test package

      - name: Normalizar nombre del owner (minúsculas para GHCR)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen Docker (versionada)
        uses: docker/build-push-action@v5
        with:
          context: ./gestion_pacientes
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gestion_pacientes:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/gestion_pacientes:latest
