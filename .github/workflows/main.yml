name: Pipeline CI/CD - Gestión de Pacientes

on:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Compilar y Publicar en GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y empaquetar con Maven
        run: |
          mvn clean package -DskipTests

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # === PASO CORRECTIVO DE SEGURIDAD Y FORMATO ===
      - name: Formatear nombre de repositorio a minúsculas
        id: string
        run: |
          echo "repo_lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.repo_lowercase }}:latest