name: Pipeline CI/CD - Gestión de Pacientes

on:
  push:
    branches: [ "main", "develop" ] # Se activa al subir cambios en develop o main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Compilar y Publicar en GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # ¡CORREGIDO! Cambiado de 17 a 21 para que coincida con tu pom.xml
          distribution: 'temurin'
          cache: maven

      - name: Compilar y empaquetar con Maven
        run: |
          mvn clean package -DskipTests

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: . # ¡CORREGIDO! Contexto en la raíz donde está tu Dockerfile real
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gestion-pacientes:latest