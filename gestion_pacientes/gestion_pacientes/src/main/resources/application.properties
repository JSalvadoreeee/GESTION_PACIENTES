server.port=8081
spring.application.name=gestion-pacientes

# --- CONFIGURACIÓN DE BASE DE DATOS (LARAGON) ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_paciente_service?rewriteBatchedStatements=true&useSSL=false&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIÓN DE JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- OPTIMIZACIÓN PARA CARGA MASIVA ---
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.open-in-view=false

# --- MIGRACIONES CON FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- COMPATIBILIDAD Y RUTAS ---
spring.cloud.compatibility-verifier.enabled=false
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# --- CONFIGURACIÓN SWAGGER (SPRINGDOC) ---
# Ruta para el JSON de OpenAPI
springdoc.api-docs.path=/v3/api-docs
# URL personalizada para el informe (Actividad Duoc)
springdoc.swagger-ui.path=/saludplus-pacientes-docs.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.enabled=true
# Paquete donde están tus controladores del Micro A
springdoc.packages-to-scan=com.SaludPlus.gestion_pacientes.controller
springdoc.override-with-generic-response=true

# --- PERSONALIZACIÓN DE LA INTERFAZ ---
# Habilitar filtro de búsqueda de endpoints en la UI
springdoc.swagger-ui.filter=true
# Mostrar la duración de ejecución de las APIs (útil para performance)
springdoc.swagger-ui.display-request-duration=true
# Mantener los modelos/esquemas contraídos por defecto para mayor orden
springdoc.swagger-ui.default-models-expand-depth=1

# --- CONFIGURACIÓN DE ERRORES ---
# Esto ayuda a ver por qué falla una petición (ej. el mensaje del 403)
server.error.include-message=always
server.error.include-binding-errors=always

# --- LOGS PARA DEBUGGING ---
logging.level.org.springframework.security=INFO
logging.level.org.springdoc=DEBUG